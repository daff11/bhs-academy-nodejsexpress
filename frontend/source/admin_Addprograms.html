@@include('header.htm')

@@include('blocks/sidebar_admin.htm', {"programs": "active"})

<section class="adminDashboard pl-170 bg-light full-page-contain">
  <div class="content col-md-9">
    <h2 class="mb-4" id="programsTitle">Programs Form</h2>

    <!-- Form Add Program (hidden default) -->
    <div id="formAddProgram" class="card" style="padding: 30px;">
      <form id="programForm">

        <div class="mb-3">
          <label>Nama Program</label>
          <input type="text" class="form-control" name="nama_program" required>
        </div>

        <div class="mb-3">
          <label>Type</label>
          <select class="form-control" name="type" required>
              <!-- Dropdown Type diisi dengan data dari API -->
          </select>
        </div>

        <div class="mb-3">
          <label>Gambar (jpg/png, max 4MB)</label>
          <div class="custom-file mb-2">
            <input type="file" class="custom-file-input" id="gambarUpload" name="gambar" accept="image/jpeg, image/png">
            <label class="custom-file-label" for="gambarUpload" id="gambarLabel">Choose file</label>
          </div>
          <div class="mt-2">
            <img id="previewImage" src="" alt="Preview"
                style="max-width: 200px; max-height: 120px; display: none;"
                class="rounded border" />
                <br>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="resetImageBtn" style="display: none;">Reset Gambar</button>
          </div>
        </div>

        <div class="mb-3">
          <label>Detail</label>
          <textarea class="form-control" name="detail"></textarea>
        </div>

        <div class="mb-3">
          <label>Durasi (Jam/Hari)</label>
          <input type="text" class="form-control" name="durasi" placeholder="Jam">
        </div>

        <div class="row">
          <div class="col-md-8 mb-3">
            <label>Harga</label>
            <input type="text" class="form-control" name="harga" id="hargaField" placeholder="Rp">
          </div>
          <div class="col-md-4 mb-3">
            <label>Diskon</label>
            <input type="number" class="form-control" name="diskon" placeholder="%">
          </div>
        </div>


        <!-- Lessons -->
        <div class="mb-4">
          <label>Lessons</label>
          <div id="lessonsContainer"></div>
          <button type="button" class="btn btn-success btn-sm mt-2" id="addLessonBtn">+ Lesson</button>
        </div>

        <!-- Prospects -->
        <div class="mb-4">
          <label>Prospects</label>
          <div id="prospectsContainer"></div>
          <button type="button" class="btn btn-success btn-sm mt-2" id="addProspectBtn">+ Prospect</button>
        </div>

        <!-- Teachers -->
        <div class="mb-4">
          <label>Teachers</label>
          <div id="teachersContainer"></div>
          <button type="button" class="btn btn-success btn-sm mt-2" id="addTeacherBtn">+ Teacher</button>
        </div>

        <!-- Chapters -->
        <div class="mb-4">
          <label>Chapters</label>
          <div id="chaptersContainer"></div>
          <button type="button" class="btn btn-success btn-sm mt-2" id="addChapterBtn">+ Chapter</button>
        </div>

        <button type="submit" class="btn btn-primary btn-sm">Save Program</button>

      </form>
    </div>

    <!-- Modal Add Chapter -->
    <div class="modal fade" id="chapterModal" tabindex="-1" aria-labelledby="chapterModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <form id="chapterForm">
            <div class="modal-header">
              <h5 class="modal-title" id="chapterModalLabel">Add Chapter</h5>
              <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                  <span aria-hidden="true">&times;</span>
              </button>
            </div>
            <div class="modal-body">

              <div class="mb-3">
                <label>Title (required)</label>
                <input type="text" class="form-control" name="chapter_title" required>
              </div>

              <div class="mb-3">
                <label>Video Link (YouTube only)</label>
                <input type="url" class="form-control" name="chapter_video_path">
              </div>

              <div class="mb-3">
                <label>Description</label>
                <textarea class="form-control" name="chapter_content"></textarea>
              </div>

            </div>
            <div class="modal-footer">
              <button type="submit" class="btn btn-success btn-sm">Save Chapter</button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </div>
</section>

@@include('footer.htm')

<script>
  let chaptersData = [];
  let editingChapterIndex = null;
  let chapterModal;

document.addEventListener('DOMContentLoaded', async function () {
  const pathParts = window.location.pathname.split('/');
  const programId = pathParts[pathParts.length - 1];
  const chapterModalEl = document.getElementById('chapterModal');
  chapterModal = new bootstrap.Modal(chapterModalEl);

  // Preview Image
  const gambarUpload = document.getElementById('gambarUpload');
  const previewImage = document.getElementById('previewImage');
  const gambarLabel = document.getElementById('gambarLabel');
  const resetImageBtn = document.getElementById('resetImageBtn');

  gambarUpload.addEventListener('change', function () {
    const file = this.files[0];
    if (file) {
      gambarLabel.innerText = file.name;

      const reader = new FileReader();
      reader.onload = function (e) {
        previewImage.src = e.target.result;
        previewImage.style.display = 'block';
        resetImageBtn.style.display = 'inline-block';
      };
      reader.readAsDataURL(file);
    } else {
      resetPreviewImage();
    }
  });

  resetImageBtn.addEventListener('click', function () {
    gambarUpload.value = '';
    resetPreviewImage();
  });

  function resetPreviewImage() {
    previewImage.src = '';
    previewImage.style.display = 'none';
    resetImageBtn.style.display = 'none';
    gambarLabel.innerText = 'Choose file';
  }

  // Auto split price
  const hargaInput = document.getElementById('hargaField');
  hargaInput.addEventListener('input', function (e) {
    let value = this.value.replace(/\D/g, ''); // hanya angka
    if (!value) return this.value = '';
    this.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, '.'); // tambah titik
  });

  await loadLessons();
  await loadProspects();
  await loadTeachers();
  await loadProgramTypes();
  updateChaptersView();

  if (programId !== 'add') { 
    loadProgramData(programId);
  }

  document.getElementById('programForm').addEventListener('submit', handleProgramSubmit);
  document.getElementById('addLessonBtn').addEventListener('click', () => createDropdownWithActions('lessonsContainer', window.lessonsData, 'lessons[]'));
  document.getElementById('addProspectBtn').addEventListener('click', () => createDropdownWithActions('prospectsContainer', window.prospectsData, 'prospects[]'));
  document.getElementById('addTeacherBtn').addEventListener('click', () => createDropdownWithActions('teachersContainer', window.teachersData, 'teachers[]'));
  document.getElementById('addChapterBtn').addEventListener('click', showChapterModal);
  document.getElementById('chapterForm').addEventListener('submit', handleChapterSubmit);
});
</script>
