@@include('header.htm')
@@include('blocks/navigation.htm')

<section class="page-header-section bg-light mt-10" style="min-height: 100vh; display: flex;">
  <div class="container text-center">
    <h3>Forgot Password</h3>
    <form id="forgotPasswordForm">
      <input type="email" name="email" class="form-control mb-2" placeholder="Enter your email" required />
      <button type="submit" class="btn btn-primary">Send Reset Link</button>
    </form>
  </div>
</section>

@@include('footer.htm')

<script>
document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const email = this.email.value;

  fetch('/auth/request-reset-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email })
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message);
    if (data.success) {
      window.location.href = '/';
    }
  });
});
</script>
