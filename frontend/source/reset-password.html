@@include('header.htm')
@@include('blocks/navigation.htm')

<section class="page-header-section bg-light mt-10" style="min-height: 100vh; display: flex;">
  <div class="container text-center">
    <h3>Reset Password</h3>
    <form id="resetPasswordForm">
      <input class="form-control mb-2" type="password" name="newPassword" minlength="8" placeholder="At least 8 characters, incl. 1 uppercase, 1 number, 1 symbol" required />
      <input class="form-control mb-2" type="password" name="confirmPassword" placeholder="Confirm Password" required />
      <button type="submit" class="btn btn-primary">Confirm</button>
    </form>
  </div>
</section>

@@include('footer.htm')

<script>
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');

document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const data = {
    newPassword: this.newPassword.value,
    confirmPassword: this.confirmPassword.value
  };

  fetch(`/auth/reset-password?token=${token}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message);
    if (data.success) {
      window.location.href = '/';
    }
  });
});
</script>
