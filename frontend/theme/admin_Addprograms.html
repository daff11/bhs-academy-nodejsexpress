<script>
  document.addEventListener('DOMContentLoaded', function () {

    const adminImage = localStorage.getItem('adminImage');

    if (adminName && adminImage) {
      document.getElementById('username').textContent = adminName;

      const profileImgs = document.querySelectorAll('img.profile_image, #profile_image');

<script>
  function toggleNav() {
    const sidebar = document.getElementById("mySidenav-admin");
    sidebar.classList.toggle("open");
  }

  // Tutup sidebar jika klik di luar (hanya jika dibuka dengan burger button)
  document.addEventListener("click", function (event) {
    const sidebar = document.getElementById("mySidenav-admin");
    const burgerBtn = document.querySelector(".burger-btn");

    if (!sidebar.contains(event.target) && !burgerBtn.contains(event.target)) {
      sidebar.classList.remove("open");
    }
  });

  const profileButton = document.getElementById('profileButton');
  const dropdownMenu = document.getElementById('dropdownMenu');

  // Toggle dropdown menu visibility
  profileButton.addEventListener('click', () => {
    dropdownMenu.classList.toggle('active');
  });

  // Klik di luar menu untuk menutupnya
  document.addEventListener('click', (event) => {
    if (!profileButton.contains(event.target) && !dropdownMenu.contains(event.target)) {
      dropdownMenu.classList.remove('active');
    }
  });

  // Logout functionality
  document.getElementById('logoutLink').addEventListener('click', function(event) {
    event.preventDefault();

    // Call logout endpoint
    fetch('/auth/logout', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      credentials: 'include'
    })
      .then(response => {
        if (response.ok) {
          localStorage.clear();
          window.location.href = '/';
        } else {
          alert('Error logging out. Please try again.');
        }
      })
      .catch(error => console.error('Logout error:', error));
  });
</script>

<script>
  let chaptersData = [];
  let editingChapterIndex = null;
  let chapterModal;

document.addEventListener('DOMContentLoaded', async function () {
  const pathParts = window.location.pathname.split('/');
  const programId = pathParts[pathParts.length - 1];
  const chapterModalEl = document.getElementById('chapterModal');
  chapterModal = new bootstrap.Modal(chapterModalEl);

  // Preview Image
  const gambarUpload = document.getElementById('gambarUpload');
  const previewImage = document.getElementById('previewImage');
  const gambarLabel = document.getElementById('gambarLabel');
  const resetImageBtn = document.getElementById('resetImageBtn');

  gambarUpload.addEventListener('change', function () {
    const file = this.files[0];
    if (file) {
      gambarLabel.innerText = file.name;

      const reader = new FileReader();
      reader.onload = function (e) {
        previewImage.src = e.target.result;
        previewImage.style.display = 'block';
        resetImageBtn.style.display = 'inline-block';
      };
      reader.readAsDataURL(file);
    } else {
      resetPreviewImage();
    }
  });

  resetImageBtn.addEventListener('click', function () {
    gambarUpload.value = '';
    resetPreviewImage();
  });

  function resetPreviewImage() {
    previewImage.src = '';
    previewImage.style.display = 'none';
    resetImageBtn.style.display = 'none';
    gambarLabel.innerText = 'Choose file';
  }

  // Auto split price
  const hargaInput = document.getElementById('hargaField');
  hargaInput.addEventListener('input', function (e) {
    let value = this.value.replace(/\D/g, ''); // hanya angka
    if (!value) return this.value = '';
    this.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, '.'); // tambah titik
  });

  await loadLessons();
  await loadProspects();
  await loadTeachers();
  await loadProgramTypes();
  updateChaptersView();

  if (programId !== 'add') { 
    loadProgramData(programId);
  }

  document.getElementById('programForm').addEventListener('submit', handleProgramSubmit);
  document.getElementById('addLessonBtn').addEventListener('click', () => createDropdownWithActions('lessonsContainer', window.lessonsData, 'lessons[]'));
  document.getElementById('addProspectBtn').addEventListener('click', () => createDropdownWithActions('prospectsContainer', window.prospectsData, 'prospects[]'));
  document.getElementById('addTeacherBtn').addEventListener('click', () => createDropdownWithActions('teachersContainer', window.teachersData, 'teachers[]'));
  document.getElementById('addChapterBtn').addEventListener('click', showChapterModal);
  document.getElementById('chapterForm').addEventListener('submit', handleChapterSubmit);
});
</script>
