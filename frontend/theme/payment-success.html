<!-- Modal Register -->
<div class="modal fade" id="signupModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content rounded-0 border-0 p-4">
            <div class="modal-header border-0">
                <h3>Register</h3>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="login">
                    <form id="registerForm" class="row">
                        <div class="col-12">
                            <input required type="text" class="form-control mb-3" id="fullname" name="fullname" placeholder="Your Fullname">
                        </div>
                        <div class="col-12">
                            <input required type="email" class="form-control mb-3" id="email" name="email" placeholder="Your Email">
                        </div>
                        <div class="col-12">
                            <input required type="text" class="form-control mb-3" id="phone" name="phone" placeholder="Your Phone Number">
                        </div>
                        <div class="col-12">
                            <input type="password" 
                                    class="form-control mb-1" 
                                    id="password" 
                                    name="password" 
                                    minlength="8" 
                                    required 
                                    placeholder="At least 8 characters, incl. 1 uppercase, 1 number, 1 symbol">
                        </div>
                        <div class="col-12">
                            <input required type="password" class="form-control mb-3" id="confirmpassword" name="confirmpassword" placeholder="Password Confirmation">
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary">REGISTER</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Modal LOGIN -->
<div class="modal fade" id="loginModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content rounded-0 border-0 p-4">
            <div class="modal-header border-0">
                <h3>Login</h3>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="login">
                    <form id="loginForm" class="row" method="POST">
                        <div class="col-12">
                            <input type="text" class="form-control mb-3" id="email" name="email" placeholder="Your Email">
                        </div>
                        <div class="col-12 mb-10">
                            <input type="password" class="form-control mb-3" id="password" name="password" minlength="8" placeholder="Your Password">
                            <a href="/auth/forgot-password" class="text-decoration-none">Forgot password?</a>
                        </div>
                        <!-- Placeholder CAPTCHA -->
                        <div class="col-12">
                            <div id="captcha-container" class="g-recaptcha" data-callback="onCaptchaSuccess"></div>
                            <input type="hidden" id="captchaToken" name="captchaToken">
                        </div>
                        <div class="col-12 mt-1">
                            <button id="loginButton" type="submit" class="btn btn-primary">
                                LOGIN
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
