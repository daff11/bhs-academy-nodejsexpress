<!-- Modal Register -->
<div class="modal fade" id="signupModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content rounded-0 border-0 p-4">
            <div class="modal-header border-0">
                <h3>Register</h3>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="login">
                    <form id="registerForm" class="row">
                        <div class="col-12">
                            <input required type="text" class="form-control mb-3" id="fullname" name="fullname" placeholder="Your Fullname">
                        </div>
                        <div class="col-12">
                            <input required type="email" class="form-control mb-3" id="email" name="email" placeholder="Your Email">
                        </div>
                        <div class="col-12">
                            <input required type="text" class="form-control mb-3" id="phone" name="phone" placeholder="Your Phone Number">
                        </div>
                        <div class="col-12">
                            <input type="password" 
                                    class="form-control mb-1" 
                                    id="password" 
                                    name="password" 
                                    minlength="8" 
                                    required 
                                    placeholder="At least 8 characters, incl. 1 uppercase, 1 number, 1 symbol">
                        </div>
                        <div class="col-12">
                            <input required type="password" class="form-control mb-3" id="confirmpassword" name="confirmpassword" placeholder="Password Confirmation">
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary">REGISTER</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Modal LOGIN -->
<div class="modal fade" id="loginModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content rounded-0 border-0 p-4">
            <div class="modal-header border-0">
                <h3>Login</h3>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="login">
                    <form id="loginForm" class="row" method="POST">
                        <div class="col-12">
                            <input type="text" class="form-control mb-3" id="email" name="email" placeholder="Your Email">
                        </div>
                        <div class="col-12 mb-10">
                            <input type="password" class="form-control mb-3" id="password" name="password" minlength="8" placeholder="Your Password">
                            <a href="/auth/forgot-password" class="text-decoration-none">Forgot password?</a>
                        </div>
                        <!-- Placeholder CAPTCHA -->
                        <div class="col-12">
                            <div id="captcha-container" class="g-recaptcha" data-callback="onCaptchaSuccess"></div>
                            <input type="hidden" id="captchaToken" name="captchaToken">
                        </div>
                        <div class="col-12 mt-1">
                            <button id="loginButton" type="submit" class="btn btn-primary">
                                LOGIN
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<section class="page-header-section bg-light mt-3" style="min-height: 100vh; display: flex;"> 
  <div class="container text-center" id="payment-container">
    <h2 class="section-title mb-4" id="payment-deadline" style="font-size: 1.5rem;"></h2>
    <h2 class="section-title mb-4 text-primary" id="amount" style="font-size: 2.5rem;"></h2>

    <!-- Grid Pilihan Bank -->
    <div class="form-group mt-4" style="max-width: 400px; margin: 0 auto;">
      <label for="payment-method-select"><strong>Select Payment Method</strong></label>
      <select id="payment-method-select" class="form-control">
        <option disabled selected>-- Pilih --</option>
        <optgroup label="Bank Transfers">
          <option value="bca">BCA</option>
          <option value="bni">BNI</option>
          <option value="bri">BRI</option>
          <option value="mandiri">Mandiri</option>
          <option value="cimb">CIMB</option>
        </optgroup>
        <optgroup label="E-Wallet">
          <option value="dana">Dana</option>
          <option value="ovo">OVO</option>
          <option value="spaylater">Spay Later</option>
        </optgroup>
      </select>
    </div>

    <!-- Info pembayaran -->
    <div id="payment-info" class="mt-4" style="display: none; max-width: 600px; margin: 0 auto;">
      <div class="card">
        <div class="card-body">
          <p><strong>Methods:</strong> <span id="bank-name">-</span></p>
          <p><strong>Virtual Account Numbers:</strong> <span id="va-number">-</span>
            <i class="fa fa-clone text-color" onclick="copyVA()" style="cursor: pointer; margin-left: 8px;"></i>
          </p>
        </div>
      </div>
    
      <h5 class="mt-4">Instruksi Pembayaran</h5>
      <ul id="instructions-list" class="text-left mx-auto"></ul>
    </div>
  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', async function () {
    await createPendingTransaction(); // <--- BUAT TRANSAKSI DULU
    initPaymentCategorySelector();    // <--- DROPDOWN METHOD

    const urlParams = new URLSearchParams(window.location.search);
    const autoMethod = urlParams.get("method");

    if (autoMethod) {
        // Auto-trigger pilihan VA
        const dropdown = document.getElementById("payment-method-select");
        dropdown.value = autoMethod;

        // Trigger manual event supaya listener tetap jalan
        const event = new Event("change");
        dropdown.dispatchEvent(event);
    }
});
</script>
